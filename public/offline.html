<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>오프라인 · MEETING.SUB</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --cyan: #00E5FF;
        --text-hi: #F5F7FA;
        --text-lo: rgba(245, 247, 250, 0.55);
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text-hi); }
      body {
        font-family: 'Space Grotesk', 'Inter', system-ui, -apple-system, 'Segoe UI', 'Noto Sans KR', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        width: 100%;
        padding: 28px 24px;
        border-radius: 24px;
        background: rgba(18, 18, 20, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 16px 40px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(12px);
        text-align: center;
      }
      .hud {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--cyan);
      }
      .dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--cyan);
        box-shadow: 0 0 8px var(--cyan);
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100% { opacity: .4 } 50% { opacity: 1 } }
      h1 {
        font-size: 22px;
        margin: 14px 0 6px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0;
        color: var(--text-lo);
        font-size: 14px;
        line-height: 1.55;
      }
      button {
        margin-top: 20px;
        background: linear-gradient(135deg, #00E5FF 0%, #0097B2 100%);
        color: #0a0a0a;
        border: none;
        padding: 12px 22px;
        border-radius: 999px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 11px;
        cursor: pointer;
        box-shadow: 0 0 24px rgba(0, 229, 255, 0.45);
      }
      button:active { transform: scale(0.96); }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="hud"><span class="dot"></span>NO SIGNAL · OFFLINE</span>
      <h1>네트워크 연결이 없습니다</h1>
      <p>오프라인 상태입니다. 번역은 네트워크가 필요하지만,<br/>연결이 복구되면 자동으로 재시도합니다.</p>
      <button onclick="location.reload()">RETRY</button>
    </div>
  </body>
</html>
